<svg width="256" height="256" viewBox="14 14 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Main badge -->
  <rect x="14" y="14" width="100" height="100" rx="18" fill="url(#g1)" />

  <!-- AI label -->
  <text
    x="64" y="45"
    font-family="Arial, sans-serif"
    font-size="26"
    font-weight="bold"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="central"
  >AI</text>

  <!-- Connector lines -->
  <line x1="48" y1="81" x2="51" y2="81" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.6" />
  <line x1="77" y1="81" x2="80" y2="81" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.6" />

  <!-- B1: Plan (?) - Taller (font-size 19) -->
  <rect x="22" y="68" width="26" height="26" rx="6" fill="#ffffff" fill-opacity="0.28" />
  <text
    x="35" y="81"
    font-family="Arial, sans-serif"
    font-size="19"
    font-weight="bold"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="central"
  >?</text>

  <!-- B2: Process (clock) -->
  <rect x="51" y="68" width="26" height="26" rx="6" fill="#ffffff" fill-opacity="0.28" />
  <circle cx="64" cy="81" r="7" stroke="#ffffff" stroke-width="2" fill="none" />
  <line x1="64" y1="81" x2="64" y2="75.5" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <line x1="64" y1="81" x2="69" y2="81" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />

  <!-- B3: Done (checkmark) - Narrower -->
  <rect x="80" y="68" width="26" height="26" rx="6" fill="#ffffff" fill-opacity="0.28" />
  <path
    d="M 86 81 L 91 86 L 100 74"
    stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"
  />
</svg>
